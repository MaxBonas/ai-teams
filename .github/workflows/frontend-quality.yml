name: Frontend quality

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/frontend-quality.yml"
      - "ide-frontend/**"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/frontend-quality.yml"
      - "ide-frontend/**"
      - "package.json"

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ide-frontend
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ide-frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Install browser matrix
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run lint, component tests, build and browser matrix
        run: npm run check
