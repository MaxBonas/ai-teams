[project]
name = "aiteam-hybrid"
version = "0.1.0"
description = "AI Team orchestrator with Pro-first routing and API fallback"
requires-python = ">=3.10"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "pydantic",
    "requests",
    "aiohttp",
    "playwright",
    "psutil",
    "python-multipart",
    "pywinpty; sys_platform == 'win32'",
]

[project.scripts]
aiteam = "aiteam.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
